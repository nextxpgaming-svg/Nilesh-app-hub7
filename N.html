<!DOCTYPE html>
<html>
<head>
  <title>Nilesh App Hub</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      text-shadow: 0 0 15px cyan;
    }

    .search {
      padding: 12px;
      width: 70%;
      border-radius: 12px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,255,255,0.15);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 0 30px cyan;
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      border-radius: 10px;
      background: cyan;
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .rating {
      color: gold;
      margin-top: 5px;
    }

    footer {
      margin-top: 20px;
      padding: 15px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h1>🚀 Nilesh App Store</h1>

<input class="search" placeholder="Search apps..." onkeyup="searchApps()">

<div class="container" id="apps">

  <div class="card">
    <img src="https://via.placeholder.com/200" />
    <h3>🎵 Music App</h3>
    <div class="rating">⭐⭐⭐⭐☆</div>
    <a class="btn" href="YOUR_LINK_HERE" target="_blank">Open</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" />
    <h3>🎮 Game</h3>
    <div class="rating">⭐⭐⭐⭐⭐</div>
    <a class="btn" href="YOUR_LINK_HERE" target="_blank">Play</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" />
    <h3>📻 Radio App</h3>
    <div class="rating">⭐⭐⭐☆☆</div>
    <a class="btn" href="YOUR_LINK_HERE" target="_blank">Launch</a>
  </div>

</div>

<footer>
  👨‍💻 Developer: Nilesh
</footer>

<script>
function searchApps() {
  let input = document.querySelector(".search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
